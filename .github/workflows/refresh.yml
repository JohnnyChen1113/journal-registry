name: refresh-registry
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: node scripts/build.js
        env:
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
      - name: Commit changes if any
        run: |
          git config user.name "registry-bot"
          git config user.email "registry-bot@users.noreply.github.com"
          git add data derivatives
          git diff --staged --quiet || git commit -m "chore: weekly registry refresh"
          git push
